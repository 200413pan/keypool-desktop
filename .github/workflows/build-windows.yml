name: Build Desktop Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            command: npm run dist:win -- --publish never
            artifact-name: keypool-desktop-windows
            artifact-path: |
              dist/*.exe
          - platform: linux
            os: ubuntu-latest
            command: npm run dist:linux -- --publish never
            artifact-name: keypool-desktop-linux
            artifact-path: |
              dist/*.AppImage
              dist/*.deb
          - platform: macos
            os: macos-latest
            command: npm run dist:mac -- --publish never
            artifact-name: keypool-desktop-macos
            artifact-path: |
              dist/*.dmg
              dist/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: |
          node --check api-key-pool-proxy-enhanced.js
          node --check main.js

      - name: Build artifacts
        run: ${{ matrix.command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
